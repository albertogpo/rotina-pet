name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v5

      - name: Localizar os arquivos do aplicativo
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_FILE="$(find . -maxdepth 5 -type f -name package.json \
            -not -path '*/node_modules/*' | head -n 1)"

          if [ -z "$PROJECT_FILE" ]; then
            echo "::error::Não encontrei package.json no repositório."
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

          echo "Projeto encontrado em: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

          if [ ! -f "$PROJECT_DIR/package-lock.json" ]; then
            echo "::error::Encontrei package.json, mas não encontrei package-lock.json na mesma pasta."
            exit 1
          fi

      - name: Verificar variáveis do Supabase
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ONESIGNAL_APP_ID: ${{ vars.VITE_ONESIGNAL_APP_ID }}
        run: |
          set -euo pipefail

          if [ -z "${VITE_SUPABASE_URL:-}" ]; then
            echo "::error::A variável VITE_SUPABASE_URL não foi cadastrada."
            exit 1
          fi

          if [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "::error::A variável VITE_SUPABASE_PUBLISHABLE_KEY não foi cadastrada."
            exit 1
          fi

          if [ -z "${VITE_ONESIGNAL_APP_ID:-}" ]; then
            echo "::error::A variável VITE_ONESIGNAL_APP_ID não foi cadastrada."
            exit 1
          fi

          echo "As variáveis do Supabase e do OneSignal foram encontradas."

      - name: Preparar o Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.16.0'

      - name: Mostrar versões
        shell: bash
        run: |
          node --version
          npm --version
          corepack --version || true

      - name: Instalar dependências
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          echo "Tentando instalar com npm..."
          if npm ci --no-audit --no-fund; then
            echo "Dependências instaladas com npm."
          else
            echo "::warning::O npm falhou. Tentando automaticamente com pnpm."
            rm -rf node_modules
            corepack enable
            corepack prepare pnpm@10.13.1 --activate
            pnpm install --no-frozen-lockfile
          fi

      - name: Compilar o aplicativo
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_ONESIGNAL_APP_ID: ${{ vars.VITE_ONESIGNAL_APP_ID }}
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          npm run build

          if [ ! -f "dist/index.html" ]; then
            echo "::error::A compilação terminou sem gerar dist/index.html."
            exit 1
          fi

      - name: Preparar a pasta de publicação
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/pages-dist"
          cp -R "$PROJECT_DIR/dist" "$GITHUB_WORKSPACE/pages-dist"
          find "$GITHUB_WORKSPACE/pages-dist" -maxdepth 3 -type f | sort

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar os arquivos do site
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
